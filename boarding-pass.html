<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Boarding Pass</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="styles/img/plane.png" class="logo">
            <span class="brand-name">AsyncAir</span>
        </div>
    </nav>

    <main class="main-content">
        <section class="boarding-card-frame">
            <div class="boarding-pass-white">
                <div class="pass-info">
                    <h2>Boarding pass</h2>
                    <div class="details">
                        <p>Pasajero: #1357</p>
                        <p>Asiento: 12B</p>
                        <p>Estado: LISTO PARA EMBARQUE</p>
                    </div>
                </div>
                
                <div class="qr-code">
                    <img src="styles/img/QR.png" alt="Código QR" class="qr-image">
                </div>
            </div>
        </section>
    </main>

</body>
</html>
